<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台本生成 → Notion書込</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="config.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // Cloudflare Worker経由でNotionからクライアント一覧を取得
    async function fetchClientsFromNotion(notionToken) {
      if (!notionToken) return { list: [], error: "Notionトークンが未設定です" };
      try {
        const res = await fetch(
          "https://notion-proxy.y-amano.workers.dev?database_id=ed23c3c0e73c49b1868751bd9326d181",
          {
            method: "GET",
            headers: { "x-notion-token": notionToken },
          }
        );
        if (!res.ok) throw new Error(`Proxy error: ${res.status}`);
        const data = await res.json();
        if (!data.results) throw new Error("Notionからデータを取得できませんでした: " + JSON.stringify(data).substring(0, 100));
        const list = data.results.map(page => {
          const props = page.properties;
          const titleProp = Object.values(props).find(p => p.type === "title");
          return titleProp?.title?.[0]?.plain_text || "";
        }).filter(Boolean).sort();
        return { list, error: list.length === 0 ? "クライアントが見つかりませんでした" : null };
      } catch (e) {
        return { list: [], error: e.message };
      }
    }

    // ========== 設定: 対象月一覧（直近24ヶ月）==========
    const MONTH_LIST = (() => {
      const months = [];
      const now = new Date();
      for (let i = 0; i < 24; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        months.push(`${d.getFullYear()}年${d.getMonth() + 1}月`);
      }
      return months;
    })();

    const NOTION_MCP = [{ type: "url", url: "https://mcp.notion.com/mcp", name: "notion-mcp" }];

    async function callClaude(apiKey, messages, options = {}) {
      const { mcp_servers, ...restOptions } = options;
      const headers = {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
      };
      if (mcp_servers) {
        headers["anthropic-beta"] = "mcp-client-2025-04-04";
      }
      const res = await fetch("https://claude-proxy.round-night-f8a1.workers.dev/", {
        method: "POST",
        headers,
        body: JSON.stringify({
          model: "claude-sonnet-4-5-20250929",
          max_tokens: 8000,
          ...restOptions,
          ...(mcp_servers ? { mcp_servers } : {}),
          messages,
        }),
      });
      if (!res.ok) {
        const err = await res.text();
        throw new Error(`API error ${res.status}: ${err}`);
      }
      return res.json();
    }

    const STEPS = ["設定", "PDF", "台本確認", "Notion書込", "完了"];

    const inputStyle = {
      width: "100%",
      padding: "10px 14px",
      border: "1.5px solid #e0ddd6",
      borderRadius: 8,
      fontSize: 15,
      boxSizing: "border-box",
      outline: "none",
      fontFamily: "inherit",
      background: "#fff",
      cursor: "pointer",
    };

    function App() {
      const [step, setStep] = useState(0);
      const [apiKey, setApiKey] = useState(localStorage.getItem("anthropic_api_key") || "");
      const [notionToken, setNotionToken] = useState(localStorage.getItem("notion_token") || "");
      const [clientList, setClientList] = useState([]);
      const [clientName, setClientName] = useState("");
      const [targetMonth, setTargetMonth] = useState(MONTH_LIST[1]); // 先月をデフォルト
      const [pdfBase64, setPdfBase64] = useState(null);
      const [pdfName, setPdfName] = useState("");
      const [script, setScript] = useState("");
      const [loading, setLoading] = useState(false);
      const [loadingMsg, setLoadingMsg] = useState("");
      const [error, setError] = useState("");
      const [notionResult, setNotionResult] = useState("");
      const [logs, setLogs] = useState([]);
      const fileRef = useRef();

      const [editingApiKey, setEditingApiKey] = useState(!localStorage.getItem("anthropic_api_key"));
      const [editingNotionToken, setEditingNotionToken] = useState(!localStorage.getItem("notion_token"));
      const [clientsLoading, setClientsLoading] = useState(false);

      const saveNotionToken = (token) => {
        setNotionToken(token);
        localStorage.setItem("notion_token", token);
      };

      const [clientError, setClientError] = useState("");

      const loadClients = async (nt) => {
        if (!nt) return;
        setClientsLoading(true);
        setClientError("");
        const { list, error } = await fetchClientsFromNotion(nt);
        if (list.length > 0) {
          setClientList(list);
          setClientName(list[0]);
          localStorage.setItem("client_list_cache", JSON.stringify(list));
        } else if (error) {
          setClientError(error);
        }
        setClientsLoading(false);
      };

      useEffect(() => {
        const cached = localStorage.getItem("client_list_cache");
        if (cached) {
          const list = JSON.parse(cached);
          setClientList(list);
          setClientName(list[0]);
        } else {
          const ak = localStorage.getItem("anthropic_api_key") || "";
          const nt = localStorage.getItem("notion_token") || "";
          loadClients(nt);
        }
      }, []);

      const addLog = (msg) => setLogs((p) => [...p, { t: new Date().toLocaleTimeString("ja-JP"), msg }]);

      const saveApiKey = (key) => {
        setApiKey(key);
        localStorage.setItem("anthropic_api_key", key);
      };

      const handleFile = (e) => {
        const file = e.target.files[0];
        if (!file || file.type !== "application/pdf") return;
        setPdfName(file.name);
        const reader = new FileReader();
        reader.onload = (ev) => setPdfBase64(ev.target.result.split(",")[1]);
        reader.readAsDataURL(file);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (!file || file.type !== "application/pdf") return;
        setPdfName(file.name);
        const reader = new FileReader();
        reader.onload = (ev) => setPdfBase64(ev.target.result.split(",")[1]);
        reader.readAsDataURL(file);
      };

      const generateScript = async () => {
        setLoading(true);
        setError("");
        setLoadingMsg("PDFを解析して台本を生成しています…（1〜2分かかる場合があります）");
        addLog("📄 台本生成開始");
        try {
          const data = await callClaude(apiKey, [
            {
              role: "user",
              content: [
                {
                  type: "document",
                  source: { type: "base64", media_type: "application/pdf", data: pdfBase64 },
                },
                {
                  type: "text",
                  text: `あなたはSNSマーケティングの定例会で使う台本を作成する専門家です。
添付のInstagramパフォーマンスレポート（クライアント：${clientName}、対象月：${targetMonth}）を読み込み、定例会で担当者が話す台本を作成してください。

【台本作成の方針】
各ページについて以下の3点を必ず盛り込んでください：
1. 結果を伝える：具体的な数字とともに今月の結果を明確に伝える
2. なぜこの数値になったかを伝える：その数値になった要因・背景を分析して説明する
3. ここからわかることを伝える：数値から読み取れるインサイト・示唆・次のアクションを伝える

その他のルール：
- 前月比・目標対比を必ず取り上げる
- 数字的根拠を必ずメインに据え、「〇〇が△△%増加した理由は〜」という形で説明する
- クライアントが「なるほど」と感じる洞察を必ず含める
- 担当者がそのまま読み上げられる自然な話し言葉で書く
- 1ページあたり8〜12文程度でしっかり説明する

【台本の形式】
- 各セクションは「## 【Pページ番号】ページタイトル」で始める
- 話す内容は「」（鍵括弧）で囲む`,
                },
              ],
            },
          ]);
          const generated = data.content
            .filter((b) => b.type === "text")
            .map((b) => b.text)
            .join("\n");
          setScript(generated);
          addLog("✅ 台本生成完了（" + generated.length + "文字）");
          setStep(2);
        } catch (e) {
          setError(e.message);
          addLog("❌ エラー: " + e.message);
        }
        setLoading(false);
      };

      const notionProxy = async (path, method, body) => {
        const res = await fetch(
          `https://notion-proxy.y-amano.workers.dev?path=${encodeURIComponent(path)}`,
          {
            method,
            headers: { "x-notion-token": notionToken, "Content-Type": "application/json" },
            body: body ? JSON.stringify(body) : undefined,
          }
        );
        return res.json();
      };

      const writeToNotion = async () => {
        setLoading(true);
        setError("");
        setLoadingMsg("Notionページを作成・書き込み中…");
        addLog("🔍 Notion操作開始");
        try {
          // 1. クライアントのページIDを顧客DBから取得
          addLog("🔍 クライアントページを検索中...");
          const clientRes = await notionProxy(`databases/ed23c3c0e73c49b1868751bd9326d181/query`, "POST", {
            page_size: 100,
          });
          if (!clientRes.results) throw new Error("顧客DB取得失敗: " + JSON.stringify(clientRes).substring(0, 100));
          const clientPage = clientRes.results.find(p => {
            const props = p.properties;
            const titleProp = Object.values(props).find(pr => pr.type === "title");
            const name = titleProp?.title?.[0]?.plain_text || "";
            return name === clientName;
          });
          if (!clientPage) throw new Error(`「${clientName}」のページが見つかりませんでした`);
          const clientPageId = clientPage.id;
          addLog("✅ クライアントページ発見");

          // 2. 議事録データベースを検索
          addLog("🔍 議事録DBを検索中...");
          const blocksRes = await notionProxy(`blocks/${clientPageId}/children`, "GET");
          if (!blocksRes.results) throw new Error("ブロック取得失敗");
          const gijiroBlock = blocksRes.results.find(b =>
            b.type === "child_database" && b.child_database?.title?.includes("議事録")
          );
          if (!gijiroBlock) throw new Error("議事録データベースが見つかりませんでした");
          const gijiroDatabaseId = gijiroBlock.id;
          addLog("✅ 議事録DB発見");

          // 3. 今日の日付
          const today = new Date();
          const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;

          // 4. 議事録DBにページを作成
          addLog("📝 議事録ページを作成中...");
          const titleStr = `【定例会】${targetMonth.replace("年",".").replace("月","")}`;
          const newPage = await notionProxy("pages", "POST", {
            parent: { database_id: gijiroDatabaseId },
            properties: {
              "名前": { title: [{ text: { content: titleStr } }] },
              "タグ": { multi_select: [{ name: "定例会" }] },
              "日付": { date: { start: dateStr } },
            },
            children: [
              { object: "block", type: "heading_2", heading_2: { rich_text: [{ text: { content: "今月メモ" } }] } },
              { object: "block", type: "bulleted_list_item", bulleted_list_item: { rich_text: [] } },
              { object: "block", type: "bulleted_list_item", bulleted_list_item: { rich_text: [] } },
              { object: "block", type: "bulleted_list_item", bulleted_list_item: { rich_text: [] } },
              { object: "block", type: "heading_2", heading_2: { rich_text: [{ text: { content: "過去タスク" } }] } },
              { object: "block", type: "paragraph", paragraph: { rich_text: [{ text: { content: "（前回定例会のタスクを確認・追記してください）" } }] } },
              { object: "block", type: "heading_2", heading_2: { rich_text: [{ text: { content: "今月の台本" } }] } },
              ...script.split("\n").filter(Boolean).map(line => ({
                object: "block", type: "paragraph",
                paragraph: { rich_text: [{ text: { content: line } }] },
              })),
            ],
          });

          if (!newPage.url) throw new Error("ページ作成失敗: " + JSON.stringify(newPage).substring(0, 150));
          setNotionResult(newPage.url);
          addLog("✅ 議事録ページ作成完了");
          setStep(4);
        } catch (e) {
          setError(e.message);
          addLog("❌ エラー: " + e.message);
        }
        setLoading(false);
      };

      const notionUrl = notionResult && notionResult.startsWith("http") ? notionResult : null;

      return (
        <div style={{ fontFamily: "'Hiragino Sans', 'Meiryo', sans-serif", minHeight: "100vh", background: "#f5f4f0", padding: "32px 16px" }}>
          <div style={{ maxWidth: 720, margin: "0 auto" }}>

            {/* Header */}
            <div style={{ marginBottom: 32 }}>
              <div style={{ fontSize: 11, letterSpacing: "0.15em", color: "#888", textTransform: "uppercase", marginBottom: 6 }}>
                定例会 自動化ツール
              </div>
              <h1 style={{ fontSize: 22, fontWeight: 700, color: "#1a1a1a", margin: 0 }}>
                台本生成 → Notion書込
              </h1>
            </div>

            {/* API Keys */}
            <div style={{ background: "#fff", borderRadius: 12, padding: "16px 20px", marginBottom: 20, boxShadow: "0 1px 6px rgba(0,0,0,0.05)", display: "flex", flexDirection: "column", gap: 12 }}>
              {/* Claude API Key */}
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: "#555", whiteSpace: "nowrap", width: 120 }}>Claude APIキー</div>
                {editingApiKey ? (
                  <input
                    type="password"
                    value={apiKey}
                    onChange={(e) => saveApiKey(e.target.value)}
                    onBlur={() => { if (apiKey) setEditingApiKey(false); }}
                    placeholder="sk-ant-..."
                    autoFocus
                    style={{ ...inputStyle, cursor: "text", flex: 1 }}
                  />
                ) : (
                  <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <span style={{ fontSize: 13, color: "#22c55e", fontWeight: 600 }}>✓ 設定済み</span>
                    <button onClick={() => setEditingApiKey(true)} style={{ fontSize: 12, color: "#999", background: "none", border: "none", cursor: "pointer", padding: "4px 8px" }}>変更</button>
                  </div>
                )}
              </div>
              {/* Notion Token */}
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: "#555", whiteSpace: "nowrap", width: 120 }}>Notionトークン</div>
                {editingNotionToken ? (
                  <input
                    type="password"
                    value={notionToken}
                    onChange={(e) => saveNotionToken(e.target.value)}
                    onBlur={() => {
                      if (notionToken) {
                        setEditingNotionToken(false);
                        localStorage.removeItem("client_list_cache");
                        loadClients(notionToken);
                      }
                    }}
                    placeholder="ntn_..."
                    autoFocus
                    style={{ ...inputStyle, cursor: "text", flex: 1 }}
                  />
                ) : (
                  <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <span style={{ fontSize: 13, color: "#22c55e", fontWeight: 600 }}>✓ 設定済み</span>
                    <button onClick={() => setEditingNotionToken(true)} style={{ fontSize: 12, color: "#999", background: "none", border: "none", cursor: "pointer", padding: "4px 8px" }}>変更</button>
                  </div>
                )}
              </div>
              {/* クライアント更新ボタン */}
              {!editingApiKey && !editingNotionToken && (
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <button
                    onClick={() => { localStorage.removeItem("client_list_cache"); loadClients(notionToken); }}
                    disabled={clientsLoading}
                    style={{ fontSize: 11, color: "#888", background: "none", border: "1px solid #e0ddd6", borderRadius: 6, cursor: "pointer", padding: "4px 10px" }}
                  >
                    {clientsLoading ? "読み込み中..." : "クライアント一覧を更新"}
                  </button>
                </div>
              )}
            </div>

            {/* Step indicator */}
            <div style={{ display: "flex", alignItems: "center", gap: 0, marginBottom: 32 }}>
              {STEPS.map((s, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", flex: i < STEPS.length - 1 ? 1 : "none" }}>
                  <div style={{
                    width: 28, height: 28, borderRadius: "50%",
                    background: i < step ? "#1a1a1a" : i === step ? "#1a1a1a" : "#e0ddd6",
                    color: i <= step ? "#fff" : "#999",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 11, fontWeight: 700, flexShrink: 0,
                    transition: "all 0.3s"
                  }}>
                    {i < step ? "✓" : i + 1}
                  </div>
                  <div style={{ fontSize: 11, color: i === step ? "#1a1a1a" : "#999", marginLeft: 6, marginRight: 4, fontWeight: i === step ? 700 : 400, whiteSpace: "nowrap" }}>
                    {s}
                  </div>
                  {i < STEPS.length - 1 && (
                    <div style={{ flex: 1, height: 1, background: i < step ? "#1a1a1a" : "#e0ddd6", margin: "0 8px", transition: "all 0.3s" }} />
                  )}
                </div>
              ))}
            </div>

            {/* Card */}
            <div style={{ background: "#fff", borderRadius: 16, padding: 32, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", marginBottom: 24 }}>

              {/* Step 0: Settings */}
              {step === 0 && (
                <div>
                  <h2 style={{ fontSize: 16, fontWeight: 700, marginTop: 0, marginBottom: 24, color: "#1a1a1a" }}>① クライアント・台本が欲しい月を選択</h2>
                  <div style={{ display: "grid", gap: 0 }}>
                    <label style={{ display: "block", marginBottom: 24 }}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: "#555", marginBottom: 6 }}>クライアント名</div>
                      {clientsLoading ? (
                        <select style={inputStyle} disabled>
                          <option>読み込み中...</option>
                        </select>
                      ) : clientList.length > 0 ? (
                        <select
                          value={clientName}
                          onChange={(e) => setClientName(e.target.value)}
                          style={inputStyle}
                        >
                          {clientList.map((c) => <option key={c} value={c}>{c}</option>)}
                        </select>
                      ) : (
                        <input
                          type="text"
                          value={clientName}
                          onChange={(e) => setClientName(e.target.value)}
                          placeholder="クライアント名を入力してください"
                          style={{ ...inputStyle, cursor: "text" }}
                        />
                      )}
                      {clientError && (
                        <div style={{ marginTop: 6, fontSize: 11, color: "#b91c1c", background: "#fef2f2", padding: "6px 10px", borderRadius: 6 }}>
                          ⚠️ {clientError}
                        </div>
                      )}
                    </label>
                    <label style={{ display: "block" }}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: "#555", marginBottom: 6 }}>対象月</div>
                      <select
                        value={targetMonth}
                        onChange={(e) => setTargetMonth(e.target.value)}
                        style={inputStyle}
                      >
                        {MONTH_LIST.map((m) => (
                          <option key={m} value={m}>{m}</option>
                        ))}
                      </select>
                    </label>
                  </div>
                  <button
                    onClick={() => setStep(1)}
                    disabled={!clientName || !targetMonth || !apiKey}
                    style={{ marginTop: 24, padding: "12px 28px", background: "#1a1a1a", color: "#fff", border: "none", borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: "pointer", opacity: (!clientName || !targetMonth || !apiKey) ? 0.4 : 1 }}
                  >
                    次へ →
                  </button>
                  {!apiKey && (
                    <div style={{ marginTop: 10, fontSize: 12, color: "#b91c1c" }}>上のAPIキーを入力してください</div>
                  )}
                </div>
              )}

              {/* Step 1: PDF Upload */}
              {step === 1 && (
                <div>
                  <h2 style={{ fontSize: 16, fontWeight: 700, marginTop: 0, marginBottom: 8, color: "#1a1a1a" }}>レポートPDFをアップロード</h2>
                  <div style={{ fontSize: 13, color: "#666", marginBottom: 24 }}>
                    {clientName}｜{targetMonth}
                  </div>
                  <div
                    onClick={() => fileRef.current.click()}
                    onDragOver={(e) => e.preventDefault()}
                    onDrop={handleDrop}
                    style={{
                      border: "2px dashed " + (pdfBase64 ? "#1a1a1a" : "#d0cdc6"),
                      borderRadius: 12, padding: "40px 24px", textAlign: "center", cursor: "pointer",
                      background: pdfBase64 ? "#f8f7f4" : "#fafaf8",
                      transition: "all 0.2s"
                    }}
                  >
                    <div style={{ fontSize: 32, marginBottom: 12 }}>{pdfBase64 ? "✅" : "📄"}</div>
                    {pdfBase64 ? (
                      <div>
                        <div style={{ fontWeight: 600, color: "#1a1a1a", marginBottom: 4 }}>{pdfName}</div>
                        <div style={{ fontSize: 12, color: "#888" }}>クリックして変更</div>
                      </div>
                    ) : (
                      <div>
                        <div style={{ fontWeight: 600, color: "#555", marginBottom: 4 }}>PDFをドラッグ＆ドロップ またはクリックして選択</div>
                        <div style={{ fontSize: 12, color: "#999" }}>Instagramパフォーマンスレポート</div>
                      </div>
                    )}
                    <input ref={fileRef} type="file" accept="application/pdf" onChange={handleFile} style={{ display: "none" }} />
                  </div>

                  <div style={{ display: "flex", gap: 12, marginTop: 24 }}>
                    <button onClick={() => setStep(0)} style={{ padding: "12px 20px", background: "none", color: "#555", border: "1.5px solid #e0ddd6", borderRadius: 8, fontSize: 14, cursor: "pointer" }}>
                      ← 戻る
                    </button>
                    <button
                      onClick={generateScript}
                      disabled={!pdfBase64 || loading}
                      style={{ flex: 1, padding: "12px 28px", background: "#1a1a1a", color: "#fff", border: "none", borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: "pointer", opacity: (!pdfBase64 || loading) ? 0.4 : 1 }}
                    >
                      {loading ? loadingMsg : "台本を生成する →"}
                    </button>
                  </div>
                </div>
              )}

              {/* Step 2: Script Review */}
              {step === 2 && (
                <div>
                  <h2 style={{ fontSize: 16, fontWeight: 700, marginTop: 0, marginBottom: 8, color: "#1a1a1a" }}>台本を確認・編集</h2>
                  <div style={{ fontSize: 13, color: "#666", marginBottom: 16 }}>
                    {clientName}｜{targetMonth}｜{script.length}文字
                  </div>
                  <textarea
                    value={script}
                    onChange={(e) => setScript(e.target.value)}
                    style={{
                      width: "100%", minHeight: 400, padding: "16px", border: "1.5px solid #e0ddd6",
                      borderRadius: 10, fontSize: 13, lineHeight: 1.8, fontFamily: "inherit",
                      boxSizing: "border-box", resize: "vertical", color: "#1a1a1a", background: "#fafaf8",
                      outline: "none"
                    }}
                  />
                  <div style={{ display: "flex", gap: 12, marginTop: 16 }}>
                    <button onClick={() => setStep(1)} style={{ padding: "12px 20px", background: "none", color: "#555", border: "1.5px solid #e0ddd6", borderRadius: 8, fontSize: 14, cursor: "pointer" }}>
                      ← 戻る
                    </button>
                    <button
                      onClick={() => setStep(3)}
                      disabled={!script}
                      style={{ flex: 1, padding: "12px 28px", background: "#1a1a1a", color: "#fff", border: "none", borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: "pointer", opacity: !script ? 0.4 : 1 }}
                    >
                      Notionに書き込む →
                    </button>
                  </div>
                </div>
              )}

              {/* Step 3: Notion Write Confirmation */}
              {step === 3 && (
                <div>
                  <h2 style={{ fontSize: 16, fontWeight: 700, marginTop: 0, marginBottom: 24, color: "#1a1a1a" }}>Notionに書き込む</h2>
                  <div style={{ background: "#f5f4f0", borderRadius: 10, padding: 20, marginBottom: 24 }}>
                    <div style={{ fontSize: 13, color: "#555", marginBottom: 8 }}>書き込み内容</div>
                    <div style={{ fontSize: 14, fontWeight: 600, color: "#1a1a1a", marginBottom: 4 }}>作成ページ：{clientName} ＞ {targetMonth} 定例会</div>
                    <div style={{ fontSize: 13, color: "#666" }}>
                      構成：今月メモ（空欄×3）→ 過去タスク → 今月の台本
                    </div>
                  </div>
                  {loading && (
                    <div style={{ textAlign: "center", padding: "20px 0", color: "#555", fontSize: 13 }}>
                      <div style={{ fontSize: 24, marginBottom: 8 }}>⟳</div>
                      <div>{loadingMsg}</div>
                    </div>
                  )}
                  {!loading && (
                    <div style={{ display: "flex", gap: 12 }}>
                      <button onClick={() => setStep(2)} style={{ padding: "12px 20px", background: "none", color: "#555", border: "1.5px solid #e0ddd6", borderRadius: 8, fontSize: 14, cursor: "pointer" }}>
                        ← 戻る
                      </button>
                      <button
                        onClick={writeToNotion}
                        style={{ flex: 1, padding: "12px 28px", background: "#1a1a1a", color: "#fff", border: "none", borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: "pointer" }}
                      >
                        実行する →
                      </button>
                    </div>
                  )}
                </div>
              )}

              {/* Step 4: Done */}
              {step === 4 && (
                <div style={{ textAlign: "center", padding: "16px 0" }}>
                  <div style={{ fontSize: 48, marginBottom: 16 }}>🎉</div>
                  <h2 style={{ fontSize: 18, fontWeight: 700, color: "#1a1a1a", margin: "0 0 8px" }}>完了しました</h2>
                  <div style={{ fontSize: 14, color: "#666", marginBottom: 24 }}>
                    {clientName}｜{targetMonth} 定例会ページをNotionに作成しました
                  </div>
                  {notionUrl && (
                    <a
                      href={notionUrl}
                      target="_blank"
                      rel="noreferrer"
                      style={{ display: "inline-block", padding: "12px 28px", background: "#1a1a1a", color: "#fff", borderRadius: 8, textDecoration: "none", fontSize: 14, fontWeight: 600, marginBottom: 24 }}
                    >
                      Notionで開く →
                    </a>
                  )}
                  <div style={{ background: "#f5f4f0", borderRadius: 10, padding: 16, textAlign: "left" }}>
                    <div style={{ fontSize: 12, color: "#888", marginBottom: 8 }}>Notionからの応答</div>
                    <div style={{ fontSize: 13, color: "#444", whiteSpace: "pre-wrap", lineHeight: 1.6 }}>{notionResult}</div>
                  </div>
                  <button
                    onClick={() => { setStep(0); setScript(""); setPdfBase64(null); setPdfName(""); setNotionResult(""); setLogs([]); setError(""); }}
                    style={{ marginTop: 20, padding: "10px 20px", background: "none", color: "#555", border: "1.5px solid #e0ddd6", borderRadius: 8, fontSize: 13, cursor: "pointer" }}
                  >
                    最初からやり直す
                  </button>
                </div>
              )}

              {/* Error */}
              {error && (
                <div style={{ marginTop: 16, padding: "12px 16px", background: "#fff5f5", border: "1px solid #fecaca", borderRadius: 8, fontSize: 13, color: "#b91c1c" }}>
                  ⚠️ {error}
                </div>
              )}
            </div>

            {/* Log */}
            {logs.length > 0 && (
              <div style={{ background: "#1a1a1a", borderRadius: 12, padding: "16px 20px" }}>
                <div style={{ fontSize: 11, color: "#666", marginBottom: 10, letterSpacing: "0.1em" }}>LOG</div>
                {logs.map((l, i) => (
                  <div key={i} style={{ fontSize: 12, color: "#aaa", marginBottom: 4, fontFamily: "monospace" }}>
                    <span style={{ color: "#555", marginRight: 10 }}>{l.t}</span>{l.msg}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
