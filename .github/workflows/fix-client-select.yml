name: Fix Client Name Select

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Apply fix to index.html
        run: |
          python3 - << 'PYEOF'
          with open("index.html", "r", encoding="utf-8") as f:
              content = f.read()

          old = """                      <select
                        value={clientName}
                        onChange={(e) => setClientName(e.target.value)}
                        style={inputStyle}
                        disabled={clientsLoading || clientList.length === 0}
                      >
                        {clientsLoading
                          ? <option>読み込み中...</option>
                          : clientList.length === 0
                          ? <option>（上でキーを設定してください）</option>
                          : clientList.map((c) => <option key={c} value={c}>{c}</option>)
                        }
                      </select>"""

          new = """                      {clientsLoading ? (
                        <select style={inputStyle} disabled>
                          <option>読み込み中...</option>
                        </select>
                      ) : clientList.length > 0 ? (
                        <select
                          value={clientName}
                          onChange={(e) => setClientName(e.target.value)}
                          style={inputStyle}
                        >
                          {clientList.map((c) => <option key={c} value={c}>{c}</option>)}
                        </select>
                      ) : (
                        <input
                          type="text"
                          value={clientName}
                          onChange={(e) => setClientName(e.target.value)}
                          placeholder="クライアント名を入力してください"
                          style={{ ...inputStyle, cursor: "text" }}
                        />
                      )}"""

          if old in content:
              content = content.replace(old, new)
              with open("index.html", "w", encoding="utf-8") as f:
                  f.write(content)
              print("✅ Fix applied successfully")
          else:
              print("⚠️ Pattern not found - may already be fixed")
          PYEOF

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && echo "No changes" || git commit -m "fix: クライアント名リスト未取得時にテキスト入力欄へフォールバック"
          git push
